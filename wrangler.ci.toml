name = "adga-suite"
main = ".open-next/worker.js"
compatibility_date = "2026-05-20"
compatibility_flags = ["nodejs_compat"]
workers_dev = true
preview_urls = true

routes = [
  { pattern = "adga.ai", custom_domain = true },
  { pattern = "www.adga.ai", custom_domain = true },
  { pattern = "adga.ai/*", zone_name = "adga.ai" },
  { pattern = "www.adga.ai/*", zone_name = "adga.ai" }
]

[vars]
ADGA_AI_MODEL = "@cf/moonshotai/kimi-k2.6"
ADGA_ADMIN_EMAIL = "hellonolen@gmail.com"
ADGA_ADMIN_EMAILS = "hellonolen@gmail.com,kamarokyle5@gmail.com"
ADGA_LOCAL_ADMIN_BYPASS = "true"
ADP_REFERRAL_TO_EMAIL = "hellonolen@gmail.com"
WHOP_REDIRECT_URL = "https://adga.ai/suite"

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[ai]
binding = "AI"
remote = true

[[d1_databases]]
binding = "DB"
database_name = "adga-suite"
database_id = "ea9ef5d7-f2c6-4707-bdfe-811a35bb6dd8"
migrations_dir = "cloudflare/db/migrations"

[[r2_buckets]]
binding = "ASSETS_BUCKET"
bucket_name = "adga-assets"

[[r2_buckets]]
binding = "DOCUMENTS_BUCKET"
bucket_name = "adga-suite-documents"

[[r2_buckets]]
binding = "UPLOADS_BUCKET"
bucket_name = "adga-suite-uploads"

[triggers]
crons = ["*/5 * * * *", "0 * * * *"]
