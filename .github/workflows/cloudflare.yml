name: Cloudflare

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  verify:
    name: Typecheck and Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Next build
        run: npm run build

  deploy:
    name: Deploy Worker
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Check Cloudflare credentials
        if: env.CLOUDFLARE_API_TOKEN == ''
        run: |
          echo "CLOUDFLARE_API_TOKEN is not configured. Verification passed, deploy skipped."

      - name: Checkout
        if: env.CLOUDFLARE_API_TOKEN != ''
        uses: actions/checkout@v4

      - name: Setup Node
        if: env.CLOUDFLARE_API_TOKEN != ''
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install
        if: env.CLOUDFLARE_API_TOKEN != ''
        run: npm ci

      - name: Build
        if: env.CLOUDFLARE_API_TOKEN != ''
        run: npm run build:cf:ci

      - name: Upload static assets to R2
        if: env.CLOUDFLARE_API_TOKEN != ''
        run: bash scripts/upload-r2-static-assets.sh adga-assets static

      - name: Deploy to Cloudflare
        if: env.CLOUDFLARE_API_TOKEN != ''
        run: npx wrangler deploy worker.js --cwd .open-next --config ../wrangler.ci.toml --x-autoconfig=false --keep-vars
